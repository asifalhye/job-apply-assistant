name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run build:packages

      - run: npm run lint

      - run: npm run test

      - run: npm run db:migrate
        working-directory: .

      - run: npm run build -w @jaa/ui
